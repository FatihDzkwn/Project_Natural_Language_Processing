<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Product Category Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛍️ Shopee Product Category Analyzer</h1>
            <p>Prediksi kategori produk berdasarkan ulasan pelanggan</p>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <form id="predictForm">
                    <div class="form-group">
                        <label for="reviewText">Masukkan Ulasan Produk:</label>
                        <textarea 
                            id="reviewText" 
                            name="text" 
                            placeholder="Contoh: Kabel terminal ini sangat aman dan tahan lama..."
                            rows="5"
                            required>
                        </textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">Analisis</button>
                </form>
            </div>

            <!-- Result Section -->
            <div id="resultSection" class="result-section" style="display: none;">
                <h2>Hasil Prediksi</h2>
                
                <div id="resultContent" class="result-content">
                    <!-- Hasil akan ditampilkan di sini -->
                </div>
            </div>

            <!-- Examples Section -->
            <div class="examples-section">
                <h3>📝 Contoh Ulasan:</h3>
                <div class="examples-grid">
                    <button class="example-btn" data-text="Kabel terminal ini sangat aman digunakan dan bagus">
                        ⚡ Elektronik
                    </button>
                    <button class="example-btn" data-text="Ciloknya enak banget kenyal dan bumbu kacangnya mantap">
                        🍲 Makanan
                    </button>
                    <button class="example-btn" data-text="Serum ini cepat meresap dan melembabkan wajah dengan baik">
                        💄 Kecantikan
                    </button>
                    <button class="example-btn" data-text="Helm bogonya bagus kacanya bening dan nyaman dipakai">
                        🏍️ Otomotif
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2024 Natural Language Processing Project | Naga Group</p>
        </footer>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
        <p>Menganalisis...</p>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
